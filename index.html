<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDDY SUPREME - ULTIMATE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; color: #0f172a; }
        .heddy-gradient { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .option-btn { transition: 0.2s; border: 2px solid #e2e8f0; position: relative; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; transform: translateY(-2px); }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav class="heddy-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-400 p-2.5 rounded-2xl text-blue-900 shadow-lg">
                    <i class="fas fa-bolt-lightning text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tighter">HEDDY <span class="text-yellow-400">SUPREME</span></h1>
                    <p id="display-date" class="text-[10px] font-black text-blue-200 uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="adminLogin()" class="bg-white/10 hover:bg-yellow-400 hover:text-blue-900 px-5 py-2 rounded-xl text-[10px] font-black transition-all">
                TEACHER DASHBOARD
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <!-- STUDENT LOGIN -->
        <section id="login-screen" class="mt-4 animate-pop">
            <div class="glass-card rounded-[3.5rem] p-10 shadow-2xl border border-white text-center max-w-lg mx-auto">
                <div class="inline-block p-6 bg-blue-50 rounded-full mb-6">
                    <i class="fas fa-user-check text-5xl text-blue-600"></i>
                </div>
                <h2 class="text-3xl font-black text-slate-800 mb-8 uppercase">Student Portal</h2>
                
                <div class="space-y-5 text-left">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Identify Yourself</label>
                        <select id="s-name-dropdown" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold outline-none focus:border-blue-500 appearance-none">
                            <option value="">-- SELECT YOUR NAME --</option>
                            <optgroup label="BASIC 6 - 7">
                                <option value="KENNETH ANTWI">KENNETH ANTWI</option>
                                <option value="PEACE OF GOD VICTOR">PEACE OF GOD VICTOR</option>
                                <option value="EMMANUEL GADZIE">EMMANUEL GADZIE</option>
                            </optgroup>
                            <optgroup label="BASIC 8">
                                <option value="PRINCE VICTOR SUNDAY">PRINCE VICTOR SUNDAY</option>
                                <option value="ROLAND AGBOZO">ROLAND AGBOZO</option>
                                <option value="EMMANUELLA GYAMFI">EMMANUELLA GYAMFI</option>
                                <option value="PATIENCE AMOAKOWAA">PATIENCE AMOAKOWAA</option>
                                <option value="BLESSING GADZE">BLESSING GADZE</option>
                                <option value="BRAHANNAH BOATENG">BRAHANNAH BOATENG</option>
                            </optgroup>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Personal Passcode</label>
                        <input type="password" id="s-code" placeholder="ENTER CODE" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold outline-none focus:border-blue-500">
                    </div>
                    
                    <button onclick="validateStudent()" class="w-full heddy-gradient text-white font-black py-6 rounded-3xl shadow-xl hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest">
                        Verify & Enter <i class="fas fa-chevron-right ml-2"></i>
                    </button>
                </div>

                <div id="subject-selection" class="hidden mt-10 space-y-4">
                    <div id="welcome-msg" class="p-6 bg-yellow-50 rounded-3xl text-blue-900 font-black border-2 border-yellow-200 text-lg"></div>
                    <div id="subject-buttons" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </section>

        <!-- QUIZ VIEW -->
        <section id="quiz-screen" class="hidden max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-3">
                    <div id="h-subject-badge" class="bg-blue-600 text-white px-6 py-2 rounded-2xl text-xs font-black shadow-lg"></div>
                    <div class="bg-slate-800 text-white px-6 py-2 rounded-2xl text-xs font-bold"><i class="far fa-clock mr-2 text-yellow-400"></i><span id="timer-display">00:00</span></div>
                </div>
                <div id="score-ring" class="text-4xl font-black text-blue-900">0%</div>
            </div>

            <div class="glass-card rounded-[3rem] p-8 md:p-14 shadow-2xl border-b-[15px] border-blue-900">
                <div id="q-image-container" class="hidden mb-10 rounded-[2rem] overflow-hidden border-8 border-slate-50 shadow-inner">
                    <img id="q-image" src="" class="w-full h-auto max-h-96 object-contain bg-white">
                </div>

                <p id="q-progress-text" class="text-blue-500 font-black text-[10px] uppercase mb-2 tracking-widest"></p>
                <h3 id="q-text" class="text-2xl md:text-4xl font-black text-slate-800 mb-12 leading-tight"></h3>

                <!-- MCQ -->
                <div id="mcq-options" class="grid gap-5"></div>

                <!-- THEORY -->
                <div id="text-entry" class="hidden">
                    <input type="text" id="text-answer" placeholder="TYPE YOUR FULL ANSWER HERE..." class="w-full p-7 border-4 border-slate-100 rounded-[2rem] outline-none focus:border-blue-500 text-2xl font-black uppercase shadow-inner">
                    <button onclick="checkTextAns()" class="w-full mt-6 bg-blue-900 text-white py-6 rounded-[2rem] font-black text-lg shadow-lg">CONFIRM ANSWER</button>
                </div>

                <!-- HEDDY BOT -->
                <div id="bot-response" class="hidden mt-12 p-10 bg-slate-900 rounded-[3rem] text-white border-t-8 border-yellow-400">
                    <div class="flex gap-6">
                        <div class="text-5xl">🤖</div>
                        <div class="flex-1">
                            <p class="text-yellow-400 font-black text-xs mb-3 tracking-[0.2em]">HEDDY BOT FEEDBACK</p>
                            <p id="bot-msg" class="text-slate-200 font-bold italic text-xl leading-relaxed"></p>
                        </div>
                    </div>
                    <button onclick="next()" class="w-full mt-10 bg-white text-blue-900 font-black py-6 rounded-2xl hover:bg-yellow-400 transition-colors uppercase tracking-widest shadow-xl">Next Challenge <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </section>

        <!-- ADMIN DASHBOARD -->
        <section id="admin-screen" class="hidden animate-pop">
            <div class="bg-white rounded-[3.5rem] p-10 shadow-2xl border-4 border-slate-100">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                    <div>
                        <h2 class="text-4xl font-black text-blue-950">Management Hub</h2>
                        <p class="text-slate-400 font-bold">Configure your exam platform</p>
                    </div>
                    <!-- ADMIN DATE CONTROL -->
                    <div class="bg-blue-50 p-6 rounded-3xl border-2 border-blue-100">
                        <label class="block text-[10px] font-black text-blue-400 mb-2">SET SYSTEM DATE</label>
                        <div class="flex gap-2">
                            <input type="text" id="admin-date-input" placeholder="e.g. 15th May, 2026" class="p-3 rounded-xl border-2 font-bold text-xs">
                            <button onclick="updateSystemDate()" class="bg-blue-600 text-white px-4 rounded-xl text-[10px] font-black">UPDATE</button>
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <!-- QUESTION CREATOR -->
                    <div class="space-y-5 p-10 bg-slate-50 rounded-[3rem] border shadow-sm">
                        <h3 class="font-black text-blue-900 flex items-center gap-2"><i class="fas fa-plus-circle"></i> Create Task</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <select id="in-level" class="p-5 rounded-2xl border-2 font-black text-sm">
                                <option value="Basic 3-5">Basic 3-5</option>
                                <option value="Basic 6-7">Basic 6-7</option>
                                <option value="Basic 8">Basic 8</option>
                            </select>
                            <select id="in-type" onchange="toggleAdminInput()" class="p-5 rounded-2xl border-2 font-black text-sm">
                                <option value="mcq">Multiple Choice</option>
                                <option value="text">Theory (Typing)</option>
                            </select>
                        </div>
                        <input type="text" id="in-subject" placeholder="Subject Name" class="w-full p-5 rounded-2xl border-2 font-bold">
                        <input type="text" id="in-img" placeholder="Image URL (Optional)" class="w-full p-5 rounded-2xl border-2 font-bold">
                        <textarea id="in-q" placeholder="Enter Question..." class="w-full p-5 rounded-2xl border-2 font-bold h-32"></textarea>
                        
                        <!-- UPDATED MCQ INPUT WITH RADIO SELECTOR -->
                        <div id="admin-mcq" class="space-y-3">
                            <p class="text-[10px] font-black text-slate-400 px-2">ENTER OPTIONS & MARK THE CORRECT ONE</p>
                            <div class="flex items-center gap-3">
                                <input type="radio" name="correct-radio" value="0" checked class="w-5 h-5">
                                <input type="text" id="opt-0" placeholder="Option 1" class="flex-1 p-4 rounded-xl border font-bold">
                            </div>
                            <div class="flex items-center gap-3">
                                <input type="radio" name="correct-radio" value="1" class="w-5 h-5">
                                <input type="text" id="opt-1" placeholder="Option 2" class="flex-1 p-4 rounded-xl border font-bold">
                            </div>
                            <div class="flex items-center gap-3">
                                <input type="radio" name="correct-radio" value="2" class="w-5 h-5">
                                <input type="text" id="opt-2" placeholder="Option 3" class="flex-1 p-4 rounded-xl border font-bold">
                            </div>
                            <div class="flex items-center gap-3">
                                <input type="radio" name="correct-radio" value="3" class="w-5 h-5">
                                <input type="text" id="opt-3" placeholder="Option 4" class="flex-1 p-4 rounded-xl border font-bold">
                            </div>
                        </div>

                        <div id="admin-text" class="hidden">
                            <input type="text" id="in-ans" placeholder="Type Exact Answer" class="w-full p-5 rounded-xl border-2 bg-green-50 font-black">
                        </div>
                        <textarea id="in-bot" placeholder="Heddy Bot analysis text..." class="w-full p-5 rounded-xl border-2 font-bold italic h-24 bg-blue-50"></textarea>
                        <button onclick="save()" class="w-full heddy-gradient text-white py-6 rounded-3xl font-black shadow-2xl tracking-widest hover:brightness-110">PUBLISH TO PORTAL</button>
                    </div>

                    <!-- RESULTS LOG -->
                    <div class="flex flex-col h-full">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-slate-800 uppercase tracking-tighter">Live Scoreboard</h3>
                            <button onclick="clearLogs()" class="text-[10px] text-red-500 font-black underline">Wipe History</button>
                        </div>
                        <div id="results-list" class="space-y-4 overflow-y-auto max-h-[700px] pr-2"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const STUDENTS = [
            { name: "KENNETH ANTWI", level: "Basic 6-7", code: "3478" },
            { name: "PRINCE VICTOR SUNDAY", level: "Basic 8", code: "zxcbnabc" },
            { name: "ROLAND AGBOZO", level: "Basic 8", code: "MIDNIGHTCALLERS" },
            { name: "PEACE OF GOD VICTOR", level: "Basic 6-7", code: "P24" },
            { name: "EMMANUEL GADZIE", level: "Basic 6-7", code: "44" },
            { name: "EMMANUELLA GYAMFI", level: "Basic 8", code: "4952" },
            { name: "PATIENCE AMOAKOWAA", level: "Basic 8", code: "9876" },
            { name: "BLESSING GADZE", level: "Basic 8", code: "080852" },
            { name: "BRAHANNAH BOATENG", level: "Basic 8", code: "14396" }
        ];

        let questions = JSON.parse(localStorage.getItem('h_sup_q')) || [];
        let results = JSON.parse(localStorage.getItem('h_sup_r')) || [];
        let sysDate = localStorage.getItem('h_sys_date') || new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        let activeQuestions = [], user = {}, cur = 0, score = 0, seconds = 0, timerInterval;

        window.onload = () => {
            document.getElementById('display-date').innerText = sysDate;
            document.getElementById('admin-date-input').value = sysDate;
        };

        function updateSystemDate() {
            const val = document.getElementById('admin-date-input').value;
            localStorage.setItem('h_sys_date', val);
            sysDate = val;
            document.getElementById('display-date').innerText = val;
            alert("System Date Updated!");
        }

        function validateStudent() {
            const name = document.getElementById('s-name-dropdown').value;
            const code = document.getElementById('s-code').value.trim();
            if(!name || !code) return alert("Select name and enter passcode!");

            const found = STUDENTS.find(s => s.name === name && s.code === code);
            if(found) {
                user = found;
                document.querySelector('.space-y-5').classList.add('hidden');
                document.getElementById('subject-selection').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `ACCESS GRANTED: ${user.name}`;
                renderSubjects();
            } else alert("Invalid Credentials!");
        }

        function renderSubjects() {
            const btnBox = document.getElementById('subject-buttons');
            const subjects = [...new Set(questions.filter(q => q.level === user.level).map(q => q.subject))];
            
            if(subjects.length === 0) {
                btnBox.innerHTML = `<p class="text-[10px] font-black text-red-500 uppercase italic py-10">No active tasks for ${user.level}.</p>`;
                return;
            }

            btnBox.innerHTML = subjects.map(sub => {
                const done = results.some(r => r.name === user.name && r.subject === sub);
                if(done) return `<div class="p-6 bg-slate-100 rounded-[2rem] border-2 font-black text-slate-400 flex justify-between items-center opacity-60">${sub} <i class="fas fa-check-double"></i></div>`;
                return `<button onclick="begin('${sub}')" class="w-full bg-white border-2 p-6 rounded-[2rem] font-black text-blue-900 hover:border-blue-500 hover:bg-blue-50 transition-all flex justify-between items-center shadow-sm">${sub} <i class="fas fa-play text-blue-300"></i></button>`;
            }).join('');
        }

        function begin(subject) {
            user.subject = subject;
            activeQuestions = questions.filter(q => q.level === user.level && q.subject === subject);
            cur = 0; score = 0;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            load();
        }

        function load() {
            const q = activeQuestions[cur];
            document.getElementById('h-subject-badge').innerText = user.subject;
            document.getElementById('q-progress-text').innerText = `CHALLENGE ${cur + 1} OF ${activeQuestions.length}`;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('bot-response').classList.add('hidden');
            
            const imgC = document.getElementById('q-image-container');
            if(q.img) { document.getElementById('q-image').src = q.img; imgC.classList.remove('hidden'); }
            else imgC.classList.add('hidden');

            const mcq = document.getElementById('mcq-options'), txt = document.getElementById('text-entry');
            if(q.type === 'mcq') {
                mcq.classList.remove('hidden'); txt.classList.add('hidden');
                mcq.innerHTML = '';
                // Shuffle logic
                let mapping = q.options.map((text, index) => ({ text, isCorrect: index === q.correctIdx }));
                mapping.sort(() => Math.random() - 0.5);

                mapping.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn w-full p-6 rounded-3xl font-black text-left bg-white text-lg shadow-sm';
                    b.innerText = opt.text;
                    b.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                        if(opt.isCorrect) { b.classList.add('correct'); score++; }
                        else { b.classList.add('wrong'); }
                        showBot(q.bot);
                    };
                    mcq.appendChild(b);
                });
            } else {
                mcq.classList.add('hidden'); txt.classList.remove('hidden');
                const inp = document.getElementById('text-answer');
                inp.value = ''; inp.disabled = false; inp.className = inp.className.split(' ').filter(c => c!=='correct' && c!=='wrong').join(' ');
            }
        }

        function checkTextAns() {
            const q = activeQuestions[cur], inp = document.getElementById('text-answer');
            const val = inp.value.trim().toLowerCase();
            inp.disabled = true;
            if(val === q.correctAns.toLowerCase()) { inp.classList.add('correct'); score++; }
            else inp.classList.add('wrong');
            showBot(q.bot + ` (Truth: ${q.correctAns})`);
        }

        function showBot(msg) {
            document.getElementById('bot-msg').innerText = msg || "Excellent logic. Keep your focus high.";
            document.getElementById('bot-response').classList.remove('hidden');
            document.getElementById('score-ring').innerText = Math.round((score/activeQuestions.length)*100) + "%";
        }

        function next() {
            cur++;
            if(cur < activeQuestions.length) load();
            else finish();
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60), s = seconds%60;
                document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }

        function finish() {
            clearInterval(timerInterval);
            const final = Math.round((score/activeQuestions.length)*100);
            
            let rank = "BEGINNER";
            if(final === 100) rank = "HEDDY ELITE";
            else if(final >= 80) rank = "MASTER";
            else if(final >= 50) rank = "SCHOLAR";

            results.push({ name: user.name, level: user.level, subject: user.subject, score: final, date: sysDate, rank: rank });
            localStorage.setItem('h_sup_r', JSON.stringify(results));
            confetti({ particleCount: 200, spread: 80 });
            
            document.getElementById('quiz-screen').innerHTML = `
                <div class="text-center p-16 glass-card rounded-[4rem] shadow-2xl">
                    <div class="text-xs font-black text-blue-500 uppercase tracking-[0.5em] mb-4">SESSION COMPLETE</div>
                    <h2 class="text-5xl font-black text-blue-950 mb-4">${rank}</h2>
                    <div class="text-9xl font-black text-blue-600 mb-10">${final}%</div>
                    <p class="text-slate-400 font-bold mb-10">Results logged for ${sysDate}</p>
                    <button onclick="location.reload()" class="w-full heddy-gradient text-white py-8 rounded-[2.5rem] font-black text-xl shadow-2xl">EXIT PORTAL</button>
                </div>`;
        }

        function save() {
            const correctRadio = document.querySelector('input[name="correct-radio"]:checked');
            const q = {
                level: document.getElementById('in-level').value,
                subject: document.getElementById('in-subject').value,
                type: document.getElementById('in-type').value,
                img: document.getElementById('in-img').value,
                text: document.getElementById('in-q').value,
                options: [document.getElementById('opt-0').value, document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value],
                correctIdx: parseInt(correctRadio.value),
                correctAns: document.getElementById('in-ans').value,
                bot: document.getElementById('in-bot').value
            };
            if(!q.text || !q.subject) return alert("Fill mandatory fields!");
            questions.push(q);
            localStorage.setItem('h_sup_q', JSON.stringify(questions));
            alert("TASK PUBLISHED!");
            document.getElementById('in-q').value = "";
        }

        function toggleAdminInput() {
            const isText = document.getElementById('in-type').value === 'text';
            document.getElementById('admin-mcq').classList.toggle('hidden', isText);
            document.getElementById('admin-text').classList.toggle('hidden', !isText);
        }

        function adminLogin() {
            if(prompt("System Key:") === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                renderAdminLogs();
            }
        }

        function renderAdminLogs() {
            document.getElementById('results-list').innerHTML = results.map((r, i) => `
                <div class="bg-white p-6 rounded-[2rem] border-2 shadow-sm flex justify-between items-center group hover:border-blue-300 transition-all">
                    <div>
                        <div class="flex items-center gap-2">
                            <p class="font-black text-blue-900">${r.name}</p>
                            <span class="text-[8px] font-black bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full uppercase">${r.rank}</span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${r.subject} • ${r.date}</p>
                    </div>
                    <div class="text-2xl font-black text-blue-600">${r.score}%</div>
                </div>`).reverse().join('');
        }

        function clearLogs() { if(confirm("Permanently erase scoreboard?")) { localStorage.removeItem('h_sup_r'); renderAdminLogs(); }}
    </script>
</body>
</html>
