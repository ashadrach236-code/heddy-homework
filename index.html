<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDDY SUPREME - PROFESSIONAL EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #0f172a; }
        .heddy-gradient { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .option-btn { transition: 0.2s; border: 2px solid #e2e8f0; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="heddy-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-400 p-2.5 rounded-2xl text-blue-900 shadow-lg">
                    <i class="fas fa-microchip text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tighter uppercase">Heddy <span class="text-yellow-400">Supreme</span></h1>
                    <p id="display-date" class="text-[10px] font-black text-blue-200 uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="adminLogin()" class="bg-white/10 hover:bg-yellow-400 hover:text-blue-900 px-5 py-2 rounded-xl text-[10px] font-black transition-all">
                TEACHER ADMIN
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <!-- STUDENT PORTAL -->
        <section id="login-screen" class="mt-4">
            <div class="glass-card rounded-[3.5rem] p-10 shadow-2xl text-center max-w-lg mx-auto border border-white">
                <div class="text-6xl mb-6">🎓</div>
                <h2 class="text-3xl font-black text-slate-800 mb-8">STUDENT LOGIN</h2>
                
                <div class="space-y-5 text-left">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Your Name</label>
                        <select id="s-name-dropdown" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold outline-none focus:border-blue-500 appearance-none">
                            <option value="">-- CHOOSE FROM LIST --</option>
                            <optgroup label="BASIC 6 - 7">
                                <option value="KENNETH ANTWI">KENNETH ANTWI</option>
                                <option value="PEACE OF GOD VICTOR">PEACE OF GOD VICTOR</option>
                                <option value="EMMANUEL GADZIE">EMMANUEL GADZIE</option>
                            </optgroup>
                            <optgroup label="BASIC 8">
                                <option value="PRINCE VICTOR SUNDAY">PRINCE VICTOR SUNDAY</option>
                                <option value="ROLAND AGBOZO">ROLAND AGBOZO</option>
                                <option value="EMMANUELLA GYAMFI">EMMANUELLA GYAMFI</option>
                                <option value="PATIENCE AMOAKOWAA">PATIENCE AMOAKOWAA</option>
                                <option value="BLESSING GADZE">BLESSING GADZE</option>
                                <option value="BRAHANNAH BOATENG">BRAHANNAH BOATENG</option>
                            </optgroup>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Security Code</label>
                        <input type="password" id="s-code" placeholder="ENTER CODE" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold outline-none focus:border-blue-500">
                    </div>
                    
                    <button onclick="validateStudent()" class="w-full heddy-gradient text-white font-black py-6 rounded-3xl shadow-xl hover:scale-[1.01] transition-all uppercase tracking-widest">
                        LOGIN TO CLASS <i class="fas fa-right-to-bracket ml-2"></i>
                    </button>
                </div>

                <div id="subject-selection" class="hidden mt-10 space-y-4">
                    <div id="welcome-msg" class="p-6 bg-blue-50 rounded-3xl text-blue-900 font-black border-2 border-blue-100"></div>
                    <div id="subject-buttons" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </section>

        <!-- QUIZ VIEW (SUPPORTS IMAGES & THEORY) -->
        <section id="quiz-screen" class="hidden max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-3">
                    <div id="h-subject-badge" class="bg-blue-600 text-white px-6 py-2 rounded-2xl text-xs font-black shadow-lg"></div>
                    <div class="bg-slate-800 text-white px-6 py-2 rounded-2xl text-xs font-bold"><span id="timer-display">00:00</span></div>
                </div>
                <div id="score-ring" class="text-4xl font-black text-blue-900">0%</div>
            </div>

            <div class="glass-card rounded-[3rem] p-8 md:p-14 shadow-2xl border-b-[15px] border-blue-900">
                <div id="q-image-container" class="hidden mb-10 rounded-[2rem] overflow-hidden border-8 border-slate-50">
                    <img id="q-image" src="" class="w-full h-auto max-h-96 object-contain">
                </div>

                <h3 id="q-text" class="text-2xl md:text-4xl font-black text-slate-800 mb-12 leading-tight"></h3>

                <!-- MCQ -->
                <div id="mcq-options" class="grid gap-5"></div>

                <!-- THEORY (THE TYPING PART) -->
                <div id="text-entry" class="hidden">
                    <input type="text" id="text-answer" placeholder="TYPE YOUR ANSWER CAREFULLY..." class="w-full p-7 border-4 border-slate-100 rounded-[2rem] outline-none focus:border-blue-500 text-2xl font-black uppercase shadow-inner">
                    <button onclick="checkTextAns()" class="w-full mt-6 bg-blue-900 text-white py-6 rounded-[2rem] font-black text-lg">SUBMIT THEORY ANSWER</button>
                </div>

                <!-- HEDDY BOT ANALYSIS -->
                <div id="bot-response" class="hidden mt-12 p-10 bg-slate-900 rounded-[3rem] text-white">
                    <div class="flex gap-6">
                        <div class="text-5xl">🤖</div>
                        <div class="flex-1">
                            <p class="text-yellow-400 font-black text-xs mb-3">HEDDY BOT ANALYSIS</p>
                            <p id="bot-msg" class="text-slate-200 font-bold italic text-xl leading-relaxed"></p>
                        </div>
                    </div>
                    <button onclick="next()" class="w-full mt-10 bg-white text-blue-900 font-black py-6 rounded-2xl hover:bg-yellow-400 transition-colors uppercase">CONTINUE <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </section>

        <!-- ADMIN DASHBOARD (MANUAL THEORY MARKING) -->
        <section id="admin-screen" class="hidden">
            <div class="bg-white rounded-[3rem] p-8 shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between mb-10 gap-6">
                    <h2 class="text-3xl font-black text-blue-950 uppercase"><i class="fas fa-toolbox mr-2"></i>Teacher Control</h2>
                    
                    <div class="bg-slate-50 p-4 rounded-2xl border flex gap-3 items-center">
                        <label class="text-[10px] font-black">SYSTEM DATE:</label>
                        <input type="text" id="admin-date-input" class="p-2 border rounded-xl font-bold text-xs">
                        <button onclick="updateSystemDate()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">SET</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <!-- LEFT: CREATE TASKS -->
                    <div class="bg-slate-50 p-8 rounded-[2.5rem] border space-y-4">
                        <h3 class="font-black text-blue-900 uppercase text-xs mb-4">Add New Question</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <select id="in-level" class="p-4 rounded-2xl border font-black text-sm">
                                <option value="Basic 6-7">Basic 6-7</option>
                                <option value="Basic 8">Basic 8</option>
                                <option value="Basic 3-5">Basic 3-5</option>
                            </select>
                            <select id="in-type" onchange="toggleAdminInput()" class="p-4 rounded-2xl border font-black text-sm">
                                <option value="mcq">MCQ</option>
                                <option value="text">Theory (Typing)</option>
                            </select>
                        </div>
                        <input type="text" id="in-subject" placeholder="Subject Name" class="w-full p-4 border rounded-2xl font-bold">
                        <input type="text" id="in-img" placeholder="Image URL (Optional)" class="w-full p-4 border rounded-2xl font-bold text-xs">
                        <textarea id="in-q" placeholder="Enter Question..." class="w-full p-4 border rounded-2xl font-bold h-24"></textarea>
                        
                        <div id="admin-mcq" class="space-y-2">
                            <div class="flex items-center gap-2">
                                <input type="radio" name="correct-idx" value="0" checked>
                                <input type="text" id="opt-0" placeholder="Option A" class="w-full p-3 border rounded-xl text-sm font-bold">
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="radio" name="correct-idx" value="1">
                                <input type="text" id="opt-1" placeholder="Option B" class="w-full p-3 border rounded-xl text-sm font-bold">
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="radio" name="correct-idx" value="2">
                                <input type="text" id="opt-2" placeholder="Option C" class="w-full p-3 border rounded-xl text-sm font-bold">
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="radio" name="correct-idx" value="3">
                                <input type="text" id="opt-3" placeholder="Option D" class="w-full p-3 border rounded-xl text-sm font-bold">
                            </div>
                        </div>

                        <div id="admin-text" class="hidden">
                            <input type="text" id="in-ans" placeholder="Expected Keyword/Answer" class="w-full p-5 rounded-2xl border bg-green-50 font-black">
                        </div>
                        
                        <textarea id="in-bot" placeholder="Heddy Bot explanation..." class="w-full p-4 border rounded-2xl font-bold h-20 text-xs italic"></textarea>
                        <button onclick="save()" class="w-full heddy-gradient text-white py-5 rounded-2xl font-black shadow-lg">PUBLISH TASK</button>
                    </div>

                    <!-- RIGHT: MANUAL MARKING INBOX -->
                    <div class="space-y-6">
                        <div class="flex justify-between items-center border-b pb-4">
                            <h3 class="font-black text-slate-800 uppercase text-xs">Theory Review Inbox</h3>
                            <span id="review-count" class="bg-red-500 text-white text-[10px] px-2 py-1 rounded-full font-black">0 PENDING</span>
                        </div>
                        <div id="review-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                            <!-- Theory answers requiring manual sense check will appear here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const STUDENTS = [
            { name: "KENNETH ANTWI", level: "Basic 6-7", code: "3478" },
            { name: "PRINCE VICTOR SUNDAY", level: "Basic 8", code: "zxcbnabc" },
            { name: "ROLAND AGBOZO", level: "Basic 8", code: "MIDNIGHTCALLERS" },
            { name: "PEACE OF GOD VICTOR", level: "Basic 6-7", code: "P24" },
            { name: "EMMANUEL GADZIE", level: "Basic 6-7", code: "44" },
            { name: "EMMANUELLA GYAMFI", level: "Basic 8", code: "4952" },
            { name: "PATIENCE AMOAKOWAA", level: "Basic 8", code: "9876" },
            { name: "BLESSING GADZE", level: "Basic 8", code: "080852" },
            { name: "BRAHANNAH BOATENG", level: "Basic 8", code: "14396" }
        ];

        let questions = JSON.parse(localStorage.getItem('h_sup_q')) || [];
        let theorySubmissions = JSON.parse(localStorage.getItem('h_sup_theory')) || [];
        let sysDate = localStorage.getItem('h_sys_date') || "Wednesday, 13th May, 2026";
        
        let activeQuestions = [], user = {}, cur = 0, score = 0, seconds = 0, timerInterval;

        window.onload = () => {
            document.getElementById('display-date').innerText = sysDate;
            document.getElementById('admin-date-input').value = sysDate;
            renderReviewInbox();
        };

        function validateStudent() {
            const name = document.getElementById('s-name-dropdown').value;
            const code = document.getElementById('s-code').value.trim();
            const found = STUDENTS.find(s => s.name === name && s.code === code);
            if(found) {
                user = found;
                document.querySelector('.space-y-5').classList.add('hidden');
                document.getElementById('subject-selection').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `ACCESS GRANTED: ${user.name}`;
                renderSubjects();
            } else alert("Access Denied!");
        }

        function renderSubjects() {
            const btnBox = document.getElementById('subject-buttons');
            const subjects = [...new Set(questions.filter(q => q.level === user.level).map(q => q.subject))];
            btnBox.innerHTML = subjects.map(sub => `
                <button onclick="begin('${sub}')" class="w-full bg-white border-2 p-6 rounded-[2rem] font-black text-blue-900 hover:border-blue-500 flex justify-between items-center shadow-sm">${sub} <i class="fas fa-play text-blue-300"></i></button>
            `).join('');
        }

        function begin(subject) {
            user.subject = subject;
            activeQuestions = questions.filter(q => q.level === user.level && q.subject === subject);
            cur = 0; score = 0;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            load();
        }

        function load() {
            const q = activeQuestions[cur];
            document.getElementById('h-subject-badge').innerText = user.subject;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('bot-response').classList.add('hidden');
            
            const imgC = document.getElementById('q-image-container');
            if(q.img) { document.getElementById('q-image').src = q.img; imgC.classList.remove('hidden'); }
            else imgC.classList.add('hidden');

            const mcq = document.getElementById('mcq-options'), txt = document.getElementById('text-entry');
            if(q.type === 'mcq') {
                mcq.classList.remove('hidden'); txt.classList.add('hidden');
                mcq.innerHTML = '';
                let mapping = q.options.map((t, i) => ({ t, isC: i == q.correctIdx })).sort(() => Math.random() - 0.5);
                mapping.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn w-full p-6 rounded-3xl font-black text-left bg-white text-lg shadow-sm';
                    b.innerText = opt.t;
                    b.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                        if(opt.isC) { b.classList.add('correct'); score++; } else b.classList.add('wrong');
                        showBot(q.bot);
                    };
                    mcq.appendChild(b);
                });
            } else {
                mcq.classList.add('hidden'); txt.classList.remove('hidden');
                document.getElementById('text-answer').value = '';
                document.getElementById('text-answer').disabled = false;
            }
        }

        function checkTextAns() {
            const q = activeQuestions[cur], inp = document.getElementById('text-answer');
            const typed = inp.value.trim();
            inp.disabled = true;

            // Log submission for manual teacher review
            theorySubmissions.push({
                student: user.name,
                subject: user.subject,
                question: q.text,
                expected: q.correctAns,
                provided: typed,
                id: Date.now()
            });
            localStorage.setItem('h_sup_theory', JSON.stringify(theorySubmissions));

            // Auto-mark logic for initial feedback
            if(typed.toLowerCase() === q.correctAns.toLowerCase()) {
                inp.classList.add('correct');
                score++;
                showBot(q.bot);
            } else {
                inp.classList.add('wrong');
                showBot("Submission logged for teacher review. Don't worry about small spelling mistakes.");
            }
        }

        function showBot(msg) {
            document.getElementById('bot-msg').innerText = msg;
            document.getElementById('bot-response').classList.remove('hidden');
            document.getElementById('score-ring').innerText = Math.round((score/activeQuestions.length)*100) + "%";
        }

        function next() {
            cur++;
            if(cur < activeQuestions.length) load();
            else finish();
        }

        function finish() {
            clearInterval(timerInterval);
            const final = Math.round((score/activeQuestions.length)*100);
            confetti({ particleCount: 200, spread: 80 });
            document.getElementById('quiz-screen').innerHTML = `
                <div class="text-center p-16 glass-card rounded-[4rem] shadow-2xl">
                    <h2 class="text-5xl font-black text-blue-950 mb-10">${final}%</h2>
                    <p class="font-bold text-slate-400 mb-10">Task submitted successfully.</p>
                    <button onclick="location.reload()" class="w-full heddy-gradient text-white py-8 rounded-[2.5rem] font-black text-xl shadow-2xl">EXIT CLASS</button>
                </div>`;
        }

        // ADMIN FUNCTIONS
        function toggleAdminInput() {
            const isText = document.getElementById('in-type').value === 'text';
            document.getElementById('admin-mcq').classList.toggle('hidden', isText);
            document.getElementById('admin-text').classList.toggle('hidden', !isText);
        }

        function updateSystemDate() {
            sysDate = document.getElementById('admin-date-input').value;
            localStorage.setItem('h_sys_date', sysDate);
            document.getElementById('display-date').innerText = sysDate;
            alert("System Date Saved.");
        }

        function renderReviewInbox() {
            const inbox = document.getElementById('review-list');
            document.getElementById('review-count').innerText = `${theorySubmissions.length} PENDING`;
            inbox.innerHTML = theorySubmissions.map((sub, i) => `
                <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm space-y-4">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-black bg-blue-100 text-blue-600 px-2 rounded-full">${sub.student}</span>
                        <button onclick="deleteTheory(${i})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <p class="text-xs font-bold text-slate-800">Q: ${sub.question}</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-3 bg-red-50 rounded-xl border border-red-100">
                            <label class="text-[8px] font-black text-red-400 block mb-1">STUDENT TYPED:</label>
                            <p class="text-sm font-black text-red-700">${sub.provided || "[Empty]"}</p>
                        </div>
                        <div class="p-3 bg-green-50 rounded-xl border border-green-100">
                            <label class="text-[8px] font-black text-green-400 block mb-1">EXPECTED ANSWER:</label>
                            <p class="text-sm font-black text-green-700">${sub.expected}</p>
                        </div>
                    </div>
                    <p class="text-[9px] italic text-slate-400">If this is "correct enough," mark it as correct in your offline records or give the student a bonus point.</p>
                </div>
            `).reverse().join('');
        }

        function deleteTheory(i) {
            theorySubmissions.splice(i, 1);
            localStorage.setItem('h_sup_theory', JSON.stringify(theorySubmissions));
            renderReviewInbox();
        }

        function save() {
            const q = {
                level: document.getElementById('in-level').value,
                subject: document.getElementById('in-subject').value,
                type: document.getElementById('in-type').value,
                img: document.getElementById('in-img').value,
                text: document.getElementById('in-q').value,
                options: [document.getElementById('opt-0').value, document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value],
                correctIdx: document.querySelector('input[name="correct-idx"]:checked').value,
                correctAns: document.getElementById('in-ans').value,
                bot: document.getElementById('in-bot').value
            };
            questions.push(q);
            localStorage.setItem('h_sup_q', JSON.stringify(questions));
            alert("TASK PUBLISHED!");
        }

        function adminLogin() {
            if(prompt("System Key:") === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
            }
        }

        function startTimer() { seconds = 0; timerInterval = setInterval(() => { seconds++; let m = Math.floor(seconds/60), s = seconds%60; document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`; }, 1000); }
    </script>
</body>
</html>
