<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDDY SUPREME - STRICT VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f0f4ff; color: #1e293b; }
        .heddy-gradient { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .option-btn { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #e2e8f0; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; transform: scale(1.02); }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="heddy-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-400 p-2 rounded-xl text-blue-900 shadow-lg">
                    <i class="fas fa-lock text-xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">HEDDY <span class="text-yellow-400 italic">SECURE</span></h1>
            </div>
            <button onclick="adminLogin()" class="bg-white/10 border border-white/20 hover:bg-yellow-400 hover:text-blue-900 px-5 py-2 rounded-full text-xs font-bold transition-all">
                ADMIN
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <!-- 1. STRICT LOGIN SECTION -->
        <section id="login-screen" class="mt-8 animate-pop">
            <div class="glass-card rounded-[3rem] p-10 shadow-2xl border border-white text-center max-w-lg mx-auto">
                <div class="text-6xl mb-4">🔐</div>
                <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Secure Portal</h2>
                <p class="text-slate-500 text-sm font-bold mb-6">Enter your credentials to access tasks</p>
                
                <div id="login-form" class="space-y-4 text-left">
                    <input type="text" id="s-name" placeholder="Full Name (AS REGISTERED)" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition uppercase font-bold text-sm">
                    <input type="password" id="s-code" placeholder="Your Access Code" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition font-bold text-sm">
                    
                    <button onclick="validateStudent()" class="w-full heddy-gradient text-white font-black py-5 rounded-2xl shadow-xl hover:scale-[1.02] transition-transform">
                        VERIFY IDENTITY <i class="fas fa-fingerprint ml-2"></i>
                    </button>
                </div>

                <div id="subject-selection" class="hidden mt-6 space-y-3">
                    <div id="welcome-msg" class="mb-4 p-3 bg-blue-50 rounded-xl text-blue-700 font-bold text-sm"></div>
                    <p class="text-slate-500 font-bold mb-4">Select an available subject:</p>
                    <div id="subject-buttons" class="grid grid-cols-1 gap-3"></div>
                    <button onclick="location.reload()" class="text-xs text-slate-400 font-bold mt-6 underline">Logout</button>
                </div>
            </div>
        </section>

        <!-- 2. QUIZ INTERFACE -->
        <section id="quiz-screen" class="hidden max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2">
                    <div id="h-subject-badge" class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md"></div>
                    <div id="timer-display" class="bg-slate-800 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md">00:00</div>
                </div>
                <div id="score-ring" class="text-2xl font-black text-blue-900">0%</div>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-fill" class="h-full bg-yellow-400 w-0 transition-all duration-500"></div>
            </div>
            <div class="glass-card rounded-[2.5rem] p-8 md:p-12 shadow-2xl border-b-[12px] border-yellow-400">
                <div id="q-image-container" class="hidden mb-6 rounded-2xl overflow-hidden shadow-md">
                    <img id="q-image" src="" class="w-full h-auto max-h-64 object-contain bg-slate-100">
                </div>
                <p id="q-count" class="text-blue-500 font-bold uppercase text-xs tracking-widest mb-2"></p>
                <h3 id="q-text" class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-8 leading-tight"></h3>
                <div id="mcq-options" class="grid gap-3"></div>
                <div id="text-entry" class="hidden">
                    <input type="text" id="text-answer" placeholder="Type answer..." class="w-full p-5 border-4 border-slate-100 rounded-2xl outline-none focus:border-blue-500 text-xl font-bold">
                    <button onclick="checkTextAns()" class="w-full mt-4 bg-slate-800 text-white py-4 rounded-2xl font-bold">Submit</button>
                </div>
                <div id="bot-response" class="hidden mt-8 p-6 bg-blue-900 rounded-[2rem] text-white animate-pop">
                    <div class="flex gap-4">
                        <div class="text-3xl">🤖</div>
                        <div class="flex-1"><p id="bot-msg" class="text-slate-200 font-medium italic"></p></div>
                    </div>
                    <button onclick="next()" class="w-full mt-6 bg-white text-blue-900 font-black py-4 rounded-xl">Next <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </section>

        <!-- 3. DASHBOARD -->
        <section id="admin-screen" class="hidden">
            <div class="bg-white rounded-3xl p-8 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">Teacher Dashboard</h2>
                    <button onclick="location.reload()" class="bg-slate-100 px-4 py-2 rounded-lg font-bold text-xs">Exit</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="p-6 border rounded-2xl">
                        <h3 class="font-bold mb-4">Add New Question</h3>
                        <div class="space-y-3">
                            <select id="in-level" class="w-full p-2 border rounded-lg text-sm"><option>Basic 3-5</option><option>Basic 6</option><option>Basic 7</option><option>Basic 8</option></select>
                            <select id="in-subject" class="w-full p-2 border rounded-lg text-sm"><option>Mathematics</option><option>Science</option><option>Social Studies</option><option>English</option><option>ICT</option><option>RME</option></select>
                            <textarea id="in-q" placeholder="Question text" class="w-full p-2 border rounded-lg h-20 text-sm"></textarea>
                            <input type="text" id="opt-0" placeholder="Option A (Correct)" class="w-full p-2 border rounded-lg text-sm bg-green-50">
                            <input type="text" id="opt-1" placeholder="Option B" class="w-full p-2 border rounded-lg text-sm">
                            <input type="text" id="opt-2" placeholder="Option C" class="w-full p-2 border rounded-lg text-sm">
                            <input type="text" id="opt-3" placeholder="Option D" class="w-full p-2 border rounded-lg text-sm">
                            <button onclick="save()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Publish Question</button>
                        </div>
                    </div>
                    <div class="p-6 border rounded-2xl overflow-y-auto max-h-[500px]">
                        <h3 class="font-bold mb-4">Class Performance</h3>
                        <div id="results-body" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // STRICT STUDENT DATABASE
        const STUDENT_DB = [
            { name: "KENNETH ANTWI", level: "Basic 7", code: "3478" },
            { name: "PRINCE VICTOR SUNDAY", level: "Basic 8", code: "zxcbnabc" },
            { name: "ROLAND AGBOZO", level: "Basic 8", code: "MIDNIGHTCALLERS" },
            { name: "PEACE OF GOD VICTOR", level: "Basic 6", code: "P24" },
            { name: "EMMANUEL GADZIE", level: "Basic 6", code: "44" },
            { name: "EMMANUELLA GYAMFI", level: "Basic 8", code: "4952" },
            { name: "PATIENCE AMOAKOWAA", level: "Basic 8", code: "9876" },
            { name: "BLESSING GADZE", level: "Basic 8", code: "080852" },
            { name: "BRAHANNAH BOATENG", level: "Basic 8", code: "14396" }
        ];

        let questions = JSON.parse(localStorage.getItem('h_strict_q')) || [];
        let results = JSON.parse(localStorage.getItem('h_strict_r')) || [];
        let activeQuestions = [], user = {}, cur = 0, score = 0, seconds = 0, timerInterval;

        function validateStudent() {
            const nameInput = document.getElementById('s-name').value.trim().toUpperCase();
            const codeInput = document.getElementById('s-code').value.trim();
            
            // Check Basic 3-5 (Legacy support)
            if(nameInput && codeInput === "3535") { // Placeholder code for 3-5
                loginSuccess({ name: nameInput, level: "Basic 3-5" });
                return;
            }

            const found = STUDENT_DB.find(s => s.name === nameInput && s.code === codeInput);
            if(found) loginSuccess(found);
            else alert("Invalid Name or Access Code. Please check and try again.");
        }

        function loginSuccess(student) {
            user = student;
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('subject-selection').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Welcome, ${user.name} (${user.level})`;
            renderSubjectButtons();
        }

        function renderSubjectButtons() {
            const btnBox = document.getElementById('subject-buttons');
            // Get subjects available for this student's level
            const availableSubjects = [...new Set(questions.filter(q => q.level === user.level).map(q => q.subject))];
            
            if(availableSubjects.length === 0) {
                btnBox.innerHTML = `<p class="text-xs text-red-500 font-bold">No tasks assigned to your level yet.</p>`;
                return;
            }

            btnBox.innerHTML = availableSubjects.map(sub => {
                // NEW: Strict Check - Has the student already done this?
                const alreadyDone = results.some(r => r.name === user.name && r.subject === sub);
                
                if(alreadyDone) {
                    return `
                        <div class="w-full bg-slate-100 border-2 border-slate-200 p-5 rounded-2xl font-bold text-slate-400 flex justify-between items-center opacity-70">
                            ${sub} <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded">COMPLETED ✅</span>
                        </div>`;
                } else {
                    return `
                        <button onclick="begin('${sub}')" class="w-full bg-white border-2 border-slate-100 p-5 rounded-2xl font-black text-blue-900 hover:border-blue-500 hover:bg-blue-50 transition flex justify-between items-center">
                            ${sub} <i class="fas fa-play text-blue-400 text-xs"></i>
                        </button>`;
                }
            }).join('');
        }

        function begin(subject) {
            user.subject = subject;
            activeQuestions = questions.filter(q => q.level === user.level && q.subject === subject);
            cur = 0; score = 0;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            load();
        }

        function load() {
            const q = activeQuestions[cur];
            document.getElementById('h-subject-badge').innerText = user.subject;
            document.getElementById('q-count').innerText = `Question ${cur + 1} of ${activeQuestions.length}`;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('bot-response').classList.add('hidden');
            document.getElementById('progress-fill').style.width = ((cur / activeQuestions.length) * 100) + "%";
            
            const mcqBox = document.getElementById('mcq-options');
            mcqBox.innerHTML = '';
            // Randomize options for strictness
            let opts = [...q.options].sort(() => Math.random() - 0.5);
            opts.forEach(opt => {
                if(!opt) return;
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full p-4 rounded-xl font-bold text-left bg-white text-sm';
                btn.innerText = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                    if(opt === q.options[0]) { btn.classList.add('correct'); score++; }
                    else { btn.classList.add('wrong'); }
                    showBot(q.bot || "Analysis complete. Move to the next question.");
                };
                mcqBox.appendChild(btn);
            });
        }

        function showBot(msg) {
            document.getElementById('bot-msg').innerText = msg;
            document.getElementById('bot-response').classList.remove('hidden');
            document.getElementById('score-ring').innerText = Math.round((score/activeQuestions.length)*100) + "%";
        }

        function next() {
            cur++;
            if(cur < activeQuestions.length) load();
            else finish();
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds/60), secs = seconds%60;
                document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
            }, 1000);
        }

        function finish() {
            clearInterval(timerInterval);
            const final = Math.round((score/activeQuestions.length)*100);
            results.push({ name: user.name, level: user.level, subject: user.subject, score: final, date: new Date().toLocaleDateString() });
            localStorage.setItem('h_strict_r', JSON.stringify(results));
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            
            document.getElementById('quiz-screen').innerHTML = `
                <div class="text-center p-12 glass-card rounded-[3rem] shadow-2xl">
                    <h2 class="text-3xl font-black mb-2">Well Done, ${user.name}!</h2>
                    <p class="text-slate-500 mb-6">Subject: ${user.subject}</p>
                    <div class="text-7xl font-black text-blue-600 mb-6">${final}%</div>
                    <button onclick="location.reload()" class="w-full heddy-gradient text-white py-4 rounded-xl font-bold">Back to Portal</button>
                </div>`;
        }

        function save() {
            const q = {
                level: document.getElementById('in-level').value,
                subject: document.getElementById('in-subject').value,
                text: document.getElementById('in-q').value,
                options: [document.getElementById('opt-0').value, document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value],
                bot: "Keep practicing to master " + document.getElementById('in-subject').value
            };
            if(!q.text || !q.options[0]) return alert("Fill in the question and correct answer!");
            questions.push(q);
            localStorage.setItem('h_strict_q', JSON.stringify(questions));
            alert("Published!");
            document.getElementById('in-q').value = "";
        }

        function adminLogin() {
            if(prompt("Admin Key:") === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                document.getElementById('results-body').innerHTML = results.map(r => `
                    <div class="p-3 bg-slate-50 rounded-xl border flex justify-between text-xs">
                        <b>${r.name}</b> <span>${r.subject}: ${r.score}%</span>
                    </div>`).reverse().join('');
            }
        }
    </script>
</body>
</html>
