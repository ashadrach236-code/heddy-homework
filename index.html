<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDDY SUPREME - FULL VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; }
        .heddy-gradient { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .option-btn { transition: 0.2s ease; border: 2px solid #e2e8f0; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- NAV BAR WITH DATE -->
    <nav class="heddy-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-400 p-2 rounded-xl text-blue-900 shadow-lg">
                    <i class="fas fa-graduation-cap text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold">HEDDY SUPREME</h1>
                    <p id="current-date" class="text-[10px] font-bold text-yellow-400 uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="adminLogin()" class="bg-white/10 hover:bg-yellow-400 hover:text-blue-900 px-4 py-2 rounded-full text-[10px] font-black transition-all">
                ADMIN PANEL
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <!-- STUDENT LOGIN -->
        <section id="login-screen" class="mt-8">
            <div class="glass-card rounded-[3rem] p-10 shadow-2xl border border-white text-center max-w-lg mx-auto">
                <div class="text-6xl mb-4">🔐</div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">Secure Login</h2>
                <p class="text-slate-500 text-sm font-bold mb-8">Select your name and enter your passcode</p>
                
                <div class="space-y-4 text-left">
                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Choose Your Name</label>
                    <select id="s-name-dropdown" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500">
                        <option value="">-- SELECT FROM LIST --</option>
                        <!-- Basic 6-7 -->
                        <optgroup label="BASIC 6 - 7">
                            <option value="KENNETH ANTWI">KENNETH ANTWI</option>
                            <option value="PEACE OF GOD VICTOR">PEACE OF GOD VICTOR</option>
                            <option value="EMMANUEL GADZIE">EMMANUEL GADZIE</option>
                        </optgroup>
                        <!-- Basic 8 -->
                        <optgroup label="BASIC 8">
                            <option value="PRINCE VICTOR SUNDAY">PRINCE VICTOR SUNDAY</option>
                            <option value="ROLAND AGBOZO">ROLAND AGBOZO</option>
                            <option value="EMMANUELLA GYAMFI">EMMANUELLA GYAMFI</option>
                            <option value="PATIENCE AMOAKOWAA">PATIENCE AMOAKOWAA</option>
                            <option value="BLESSING GADZE">BLESSING GADZE</option>
                            <option value="BRAHANNAH BOATENG">BRAHANNAH BOATENG</option>
                        </optgroup>
                    </select>

                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Enter Passcode</label>
                    <input type="password" id="s-code" placeholder="••••" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500">
                    
                    <button onclick="validateStudent()" class="w-full heddy-gradient text-white font-black py-5 rounded-2xl shadow-xl hover:translate-y-[-2px] transition-all">
                        ACCESS MY TASKS <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>

                <div id="subject-selection" class="hidden mt-8 space-y-3">
                    <div id="welcome-msg" class="p-4 bg-blue-50 rounded-2xl text-blue-700 font-bold border border-blue-100"></div>
                    <div id="subject-buttons" class="grid grid-cols-1 gap-3 pt-4"></div>
                </div>
            </div>
        </section>

        <!-- QUIZ VIEW (RESTORED EVERYTHING) -->
        <section id="quiz-screen" class="hidden max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-3">
                    <div id="h-subject-badge" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-bold"></div>
                    <div class="bg-slate-800 text-white px-5 py-2 rounded-xl text-xs font-bold italic"><i class="far fa-clock mr-2"></i><span id="timer-display">00:00</span></div>
                </div>
                <div id="score-ring" class="text-3xl font-black text-blue-900">0%</div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-8 md:p-12 shadow-2xl border-b-[12px] border-blue-900">
                <div id="q-image-container" class="hidden mb-8 rounded-3xl overflow-hidden border-4 border-slate-50 shadow-inner">
                    <img id="q-image" src="" class="w-full h-auto max-h-80 object-contain">
                </div>

                <h3 id="q-text" class="text-2xl md:text-4xl font-black text-slate-800 mb-10 leading-tight"></h3>

                <!-- MCQ -->
                <div id="mcq-options" class="grid gap-4"></div>

                <!-- THEORY -->
                <div id="text-entry" class="hidden">
                    <input type="text" id="text-answer" placeholder="Type your answer..." class="w-full p-6 border-4 border-slate-100 rounded-3xl outline-none focus:border-blue-500 text-2xl font-bold">
                    <button onclick="checkTextAns()" class="w-full mt-4 bg-blue-900 text-white py-5 rounded-3xl font-black">SUBMIT RESPONSE</button>
                </div>

                <!-- HEDDY BOT ANALYSIS -->
                <div id="bot-response" class="hidden mt-10 p-8 bg-slate-900 rounded-[2.5rem] text-white">
                    <div class="flex gap-5">
                        <div class="text-4xl">🤖</div>
                        <div class="flex-1">
                            <p class="text-yellow-400 font-black text-xs mb-2 tracking-widest">HEDDY BOT FEEDBACK</p>
                            <p id="bot-msg" class="text-slate-300 font-medium italic text-lg leading-relaxed"></p>
                        </div>
                    </div>
                    <button onclick="next()" class="w-full mt-8 bg-white text-blue-900 font-black py-5 rounded-2xl hover:bg-yellow-400 transition">CONTINUE <i class="fas fa-forward ml-2"></i></button>
                </div>
            </div>
        </section>

        <!-- ADMIN -->
        <section id="admin-screen" class="hidden">
            <div class="bg-white rounded-[3rem] p-10 shadow-2xl border">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-black text-blue-900">Teacher Control</h2>
                    <button onclick="location.reload()" class="bg-slate-100 px-6 py-3 rounded-2xl font-bold text-sm">Close Admin</button>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="space-y-4 p-8 bg-slate-50 rounded-[2rem]">
                        <h3 class="font-black text-blue-800 mb-4">Create New Task</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <select id="in-level" class="p-4 rounded-2xl border font-bold">
                                <option value="Basic 3-5">Basic 3-5</option>
                                <option value="Basic 6-7">Basic 6-7</option>
                                <option value="Basic 8">Basic 8</option>
                            </select>
                            <select id="in-type" onchange="toggleAdminInput()" class="p-4 rounded-2xl border font-bold">
                                <option value="mcq">MCQ</option>
                                <option value="text">Theory (Typing)</option>
                            </select>
                        </div>
                        <input type="text" id="in-subject" placeholder="Subject (e.g. Science)" class="w-full p-4 rounded-2xl border font-bold">
                        <input type="text" id="in-img" placeholder="Image URL (Optional)" class="w-full p-4 rounded-2xl border font-bold">
                        <textarea id="in-q" placeholder="Question content..." class="w-full p-4 rounded-2xl border font-bold h-32"></textarea>
                        
                        <div id="admin-mcq" class="grid gap-2">
                            <input type="text" id="opt-0" placeholder="Correct Answer" class="p-4 rounded-xl border bg-green-50 font-bold">
                            <input type="text" id="opt-1" placeholder="Option 2" class="p-4 rounded-xl border font-bold">
                            <input type="text" id="opt-2" placeholder="Option 3" class="p-4 rounded-xl border font-bold">
                            <input type="text" id="opt-3" placeholder="Option 4" class="p-4 rounded-xl border font-bold">
                        </div>
                        <div id="admin-text" class="hidden">
                            <input type="text" id="in-ans" placeholder="Type correct answer here" class="w-full p-4 rounded-xl border bg-green-50 font-bold">
                        </div>
                        <textarea id="in-bot" placeholder="Heddy Bot analysis text..." class="w-full p-4 rounded-xl border font-bold italic h-20 bg-blue-50"></textarea>
                        <button onclick="save()" class="w-full heddy-gradient text-white py-5 rounded-2xl font-black shadow-lg">PUBLISH TO PORTAL</button>
                    </div>

                    <div class="overflow-hidden flex flex-col">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black">Class Results Log</h3>
                            <button onclick="localStorage.removeItem('h_sup_r'); location.reload();" class="text-[10px] text-red-500 font-bold underline">Clear All</button>
                        </div>
                        <div id="results-list" class="space-y-3 overflow-y-auto max-h-[600px] pr-2"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const STUDENTS = [
            { name: "KENNETH ANTWI", level: "Basic 6-7", code: "3478" },
            { name: "PRINCE VICTOR SUNDAY", level: "Basic 8", code: "zxcbnabc" },
            { name: "ROLAND AGBOZO", level: "Basic 8", code: "MIDNIGHTCALLERS" },
            { name: "PEACE OF GOD VICTOR", level: "Basic 6-7", code: "P24" },
            { name: "EMMANUEL GADZIE", level: "Basic 6-7", code: "44" },
            { name: "EMMANUELLA GYAMFI", level: "Basic 8", code: "4952" },
            { name: "PATIENCE AMOAKOWAA", level: "Basic 8", code: "9876" },
            { name: "BLESSING GADZE", level: "Basic 8", code: "080852" },
            { name: "BRAHANNAH BOATENG", level: "Basic 8", code: "14396" }
        ];

        let questions = JSON.parse(localStorage.getItem('h_sup_q')) || [];
        let results = JSON.parse(localStorage.getItem('h_sup_r')) || [];
        let activeQuestions = [], user = {}, cur = 0, score = 0, seconds = 0, timerInterval;

        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        };

        function validateStudent() {
            const name = document.getElementById('s-name-dropdown').value;
            const code = document.getElementById('s-code').value.trim();
            if(!name || !code) return alert("Select your name and enter your code!");

            const found = STUDENTS.find(s => s.name === name && s.code === code);
            if(found) {
                user = found;
                document.querySelector('.space-y-4').classList.add('hidden');
                document.getElementById('subject-selection').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Welcome back, ${user.name}`;
                renderSubjects();
            } else {
                alert("Incorrect Passcode for this student!");
            }
        }

        function renderSubjects() {
            const btnBox = document.getElementById('subject-buttons');
            const subjects = [...new Set(questions.filter(q => q.level === user.level).map(q => q.subject))];
            
            if(subjects.length === 0) {
                btnBox.innerHTML = `<p class="text-xs font-black text-red-500 italic uppercase">No tasks assigned to ${user.level} yet.</p>`;
                return;
            }

            btnBox.innerHTML = subjects.map(sub => {
                const done = results.some(r => r.name === user.name && r.subject === sub);
                if(done) return `<div class="p-5 bg-slate-100 rounded-2xl border-2 font-bold text-slate-400 flex justify-between items-center">${sub} <span class="bg-green-100 text-green-600 px-3 py-1 rounded-lg text-[10px]">FINISHED</span></div>`;
                return `<button onclick="begin('${sub}')" class="w-full bg-white border-2 p-5 rounded-2xl font-black text-blue-900 hover:border-blue-500 hover:bg-blue-50 transition flex justify-between items-center">${sub} <i class="fas fa-play-circle text-blue-400"></i></button>`;
            }).join('');
        }

        function begin(subject) {
            user.subject = subject;
            activeQuestions = questions.filter(q => q.level === user.level && q.subject === subject);
            cur = 0; score = 0;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            load();
        }

        function load() {
            const q = activeQuestions[cur];
            document.getElementById('h-subject-badge').innerText = user.subject;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('bot-response').classList.add('hidden');
            
            const imgC = document.getElementById('q-image-container');
            if(q.img) { document.getElementById('q-image').src = q.img; imgC.classList.remove('hidden'); }
            else { imgC.classList.add('hidden'); }

            const mcq = document.getElementById('mcq-options'), txt = document.getElementById('text-entry');
            if(q.type === 'mcq') {
                mcq.classList.remove('hidden'); txt.classList.add('hidden');
                mcq.innerHTML = '';
                let opts = [...q.options].sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'option-btn w-full p-5 rounded-2xl font-black text-left bg-white shadow-sm';
                    b.innerText = opt;
                    b.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                        if(opt === q.options[0]) { b.classList.add('correct'); score++; }
                        else { b.classList.add('wrong'); }
                        showBot(q.bot);
                    };
                    mcq.appendChild(b);
                });
            } else {
                mcq.classList.add('hidden'); txt.classList.remove('hidden');
                const inp = document.getElementById('text-answer');
                inp.value = ''; inp.disabled = false; inp.className = inp.className.replace('correct', '').replace('wrong', '');
            }
        }

        function checkTextAns() {
            const q = activeQuestions[cur], inp = document.getElementById('text-answer');
            const val = inp.value.trim().toLowerCase();
            inp.disabled = true;
            if(val === q.correctAns.toLowerCase()) { inp.classList.add('correct'); score++; }
            else { inp.classList.add('wrong'); }
            showBot(q.bot + ` (The answer was: ${q.correctAns})`);
        }

        function showBot(msg) {
            document.getElementById('bot-msg').innerText = msg || "Excellent effort. Analyze your result and proceed.";
            document.getElementById('bot-response').classList.remove('hidden');
            document.getElementById('score-ring').innerText = Math.round((score/activeQuestions.length)*100) + "%";
        }

        function next() {
            cur++;
            if(cur < activeQuestions.length) load();
            else finish();
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60), s = seconds%60;
                document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }

        function finish() {
            clearInterval(timerInterval);
            const final = Math.round((score/activeQuestions.length)*100);
            const date = new Date().toLocaleDateString('en-GB');
            results.push({ name: user.name, level: user.level, subject: user.subject, score: final, date: date });
            localStorage.setItem('h_sup_r', JSON.stringify(results));
            confetti({ particleCount: 150, spread: 70 });
            
            document.getElementById('quiz-screen').innerHTML = `
                <div class="text-center p-12 glass-card rounded-[3rem] shadow-2xl">
                    <h2 class="text-4xl font-black text-blue-900 mb-2">COMPLETE!</h2>
                    <p class="text-slate-500 font-bold mb-8">${user.subject} | ${date}</p>
                    <div class="text-9xl font-black text-blue-600 mb-8">${final}%</div>
                    <button onclick="location.reload()" class="w-full heddy-gradient text-white py-6 rounded-3xl font-black shadow-xl">BACK TO HOME</button>
                </div>`;
        }

        function save() {
            const q = {
                level: document.getElementById('in-level').value,
                subject: document.getElementById('in-subject').value,
                type: document.getElementById('in-type').value,
                img: document.getElementById('in-img').value,
                text: document.getElementById('in-q').value,
                options: [document.getElementById('opt-0').value, document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value],
                correctAns: document.getElementById('in-ans').value,
                bot: document.getElementById('in-bot').value
            };
            if(!q.text || !q.subject) return alert("Missing fields!");
            questions.push(q);
            localStorage.setItem('h_sup_q', JSON.stringify(questions));
            alert("Published Successfully!");
            document.getElementById('in-q').value = "";
        }

        function toggleAdminInput() {
            const isText = document.getElementById('in-type').value === 'text';
            document.getElementById('admin-mcq').classList.toggle('hidden', isText);
            document.getElementById('admin-text').classList.toggle('hidden', !isText);
        }

        function adminLogin() {
            if(prompt("Admin Key:") === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                document.getElementById('results-list').innerHTML = results.map(r => `
                    <div class="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-black text-blue-900 text-sm">${r.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${r.subject} • ${r.date}</p>
                        </div>
                        <div class="text-xl font-black text-blue-600">${r.score}%</div>
                    </div>`).reverse().join('');
            }
        }
    </script>
</body>
</html>
