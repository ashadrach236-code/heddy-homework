<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDDY SUPREME SESSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f0f4ff; color: #1e293b; }
        .heddy-gradient { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .option-btn { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #e2e8f0; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; transform: scale(1.02); }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .hidden { display: none; }
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="heddy-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-400 p-2 rounded-xl text-blue-900 shadow-lg">
                    <i class="fas fa-bolt-lightning text-xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">HEDDY <span class="text-yellow-400 italic">SUPREME</span></h1>
            </div>
            <button onclick="adminLogin()" class="bg-white/10 border border-white/20 hover:bg-yellow-400 hover:text-blue-900 px-5 py-2 rounded-full text-xs font-bold transition-all">
                TEACHER DASHBOARD
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <!-- 1. STUDENT LOGIN -->
        <section id="login-screen" class="mt-8 animate-pop">
            <div class="glass-card rounded-[3rem] p-10 shadow-2xl border border-white text-center max-w-lg mx-auto">
                <div class="text-6xl mb-4">✨</div>
                <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Student Portal</h2>
                <p class="text-slate-500 mb-8 font-medium">Select your group and enter your name</p>
                <div class="space-y-4 text-left">
                    <input type="text" id="s-name" placeholder="Your Full Name" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none transition">
                    <select id="s-group" class="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none transition font-bold">
                        <option value="">-- Choose Your Level --</option>
                        <option value="Basic 3-5">Basic 3 - 5 (Primary)</option>
                        <option value="Basic 6-7">Basic 6 - 7 (Junior High)</option>
                        <option value="Basic 8">Basic 8 (Advanced)</option>
                    </select>
                    <button onclick="begin()" class="w-full heddy-gradient text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-blue-200 transition-all">
                        ENTER SESSION <i class="fas fa-paper-plane ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- 2. QUIZ INTERFACE -->
        <section id="quiz-screen" class="hidden max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div id="h-date-display" class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md"></div>
                <div id="score-ring" class="text-2xl font-black text-blue-900">0%</div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-8 md:p-12 shadow-2xl border-b-[12px] border-yellow-400">
                <div id="q-image-container" class="hidden mb-6 rounded-2xl overflow-hidden shadow-md">
                    <img id="q-image" src="" alt="Question Illustration" class="w-full h-auto max-h-64 object-contain bg-slate-100">
                </div>
                <p id="q-count" class="text-blue-500 font-bold uppercase text-xs tracking-widest mb-2"></p>
                <h3 id="q-text" class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-8 leading-tight"></h3>

                <div id="mcq-options" class="grid gap-3"></div>
                <div id="text-entry" class="hidden">
                    <input type="text" id="text-answer" placeholder="Type your answer here..." class="w-full p-5 border-4 border-slate-100 rounded-2xl outline-none focus:border-blue-500 text-xl font-bold">
                    <button onclick="checkTextAns()" class="w-full mt-4 bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-700 transition">Submit Answer</button>
                </div>

                <div id="bot-response" class="hidden mt-8 p-6 bg-blue-900 rounded-[2rem] text-white animate-pop">
                    <div class="flex gap-4">
                        <div class="text-3xl">🤖</div>
                        <div class="flex-1">
                            <p class="text-yellow-400 font-black text-xs uppercase mb-1">Heddy Bot Analysis</p>
                            <p id="bot-msg" class="text-slate-200 font-medium italic"></p>
                        </div>
                    </div>
                    <button onclick="next()" class="w-full mt-6 bg-white text-blue-900 font-black py-4 rounded-xl hover:bg-yellow-400 transition">Next Question <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </section>

        <!-- 3. TEACHER DASHBOARD -->
        <section id="admin-screen" class="hidden animate-pop">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- PORTAL SIDEBAR -->
                <div class="lg:col-span-1 glass-card rounded-[2rem] p-6 shadow-xl h-[80vh] flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-black text-blue-900">Task Portal</h2>
                        <span id="portal-count" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">0</span>
                    </div>
                    <div id="portal-list" class="flex-1 overflow-y-auto scroll-custom space-y-2 pr-2">
                    </div>
                    <button onclick="clearQ()" class="mt-4 text-red-500 text-xs font-bold border border-red-100 py-2 rounded-lg hover:bg-red-50">Reset All Data</button>
                </div>

                <!-- MAIN EDITOR -->
                <div class="lg:col-span-2 bg-white rounded-[2rem] p-8 shadow-2xl border border-slate-200">
                    <div class="flex justify-between mb-8 border-b pb-4">
                        <div class="flex gap-4">
                            <button onclick="tab('add')" id="tab-add-btn" class="font-black text-blue-900 text-lg border-b-4 border-blue-900">Create Question</button>
                            <button onclick="tab('view')" id="tab-view-btn" class="font-bold text-slate-400 text-lg">Student Records</button>
                        </div>
                        <input type="date" id="in-date" class="p-2 bg-slate-50 rounded-lg border text-xs font-bold">
                    </div>

                    <div id="tab-add" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Target Level</label>
                                <select id="in-level" class="w-full p-3 bg-blue-50 rounded-xl border font-bold text-sm">
                                    <option value="Basic 3-5">Basic 3 - 5</option>
                                    <option value="Basic 6-7">Basic 6 - 7</option>
                                    <option value="Basic 8">Basic 8</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Input Style</label>
                                <select id="in-type" onchange="toggleInputType()" class="w-full p-3 bg-slate-50 rounded-xl border font-bold text-sm">
                                    <option value="mcq">Multiple Choice</option>
                                    <option value="text">Direct Typing</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Illustration (URL)</label>
                            <input type="text" id="in-img" placeholder="Paste image link here..." class="w-full p-3 bg-slate-50 rounded-xl border text-sm">
                        </div>

                        <textarea id="in-q" placeholder="What is the question?" class="w-full p-4 bg-slate-50 rounded-xl border-2 border-transparent focus:border-blue-400 outline-none transition h-24"></textarea>
                        
                        <div id="admin-mcq-inputs" class="grid grid-cols-2 gap-3">
                            <input type="text" id="opt-0" placeholder="Option A" class="p-3 border rounded-xl text-sm">
                            <input type="text" id="opt-1" placeholder="Option B" class="p-3 border rounded-xl text-sm">
                            <input type="text" id="opt-2" placeholder="Option C" class="p-3 border rounded-xl text-sm">
                            <input type="text" id="opt-3" placeholder="Option D" class="p-3 border rounded-xl text-sm">
                            <select id="in-correct" class="col-span-2 p-3 bg-blue-50 rounded-xl border font-bold text-blue-900">
                                <option value="0">Answer is A</option>
                                <option value="1">Answer is B</option>
                                <option value="2">Answer is C</option>
                                <option value="3">Answer is D</option>
                            </select>
                        </div>

                        <div id="admin-text-input" class="hidden">
                            <input type="text" id="in-text-ans" placeholder="Type correct answer..." class="w-full p-4 bg-green-50 border-2 border-green-200 rounded-xl outline-none font-bold">
                        </div>

                        <textarea id="in-bot" placeholder="Bot Explanation" class="w-full p-4 bg-slate-50 rounded-xl border outline-none h-20 text-sm italic"></textarea>
                        
                        <button onclick="save()" class="w-full heddy-gradient text-white py-5 rounded-2xl font-black shadow-lg">
                            ADD TO PORTAL <i class="fas fa-plus-circle ml-2"></i>
                        </button>
                    </div>

                    <div id="tab-view" class="hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 text-slate-400 uppercase text-[10px]">
                                    <tr><th class="p-4">Date</th><th>Student</th><th>Level</th><th>Score</th></tr>
                                </thead>
                                <tbody id="results-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let questions = JSON.parse(localStorage.getItem('h_supreme_q')) || [];
        let results = JSON.parse(localStorage.getItem('h_supreme_r')) || [];
        let activeQuestions = [];
        let cur = 0, score = 0, user = {};

        window.onload = () => {
            document.getElementById('in-date').valueAsDate = new Date();
            updatePortal();
        };

        function adminLogin() {
            if(prompt("Teacher Pass:") === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                renderResults();
            }
        }

        function toggleInputType() {
            const isText = document.getElementById('in-type').value === 'text';
            document.getElementById('admin-mcq-inputs').classList.toggle('hidden', isText);
            document.getElementById('admin-text-input').classList.toggle('hidden', !isText);
        }

        function save() {
            const q = {
                id: Date.now(),
                level: document.getElementById('in-level').value,
                date: document.getElementById('in-date').value,
                type: document.getElementById('in-type').value,
                text: document.getElementById('in-q').value,
                img: document.getElementById('in-img').value,
                bot: document.getElementById('in-bot').value,
                options: [document.getElementById('opt-0').value, document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value],
                correctIdx: parseInt(document.getElementById('in-correct').value),
                correctAns: document.getElementById('in-text-ans').value.trim().toLowerCase()
            };
            if(!q.text) return alert("Enter a question!");
            questions.push(q);
            localStorage.setItem('h_supreme_q', JSON.stringify(questions));
            updatePortal();
            document.getElementById('in-q').value = '';
        }

        function updatePortal() {
            const list = document.getElementById('portal-list');
            document.getElementById('portal-count').innerText = questions.length;
            list.innerHTML = questions.map((q, idx) => `
                <div class="bg-white p-3 rounded-xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="truncate mr-2">
                        <p class="text-[9px] font-bold text-blue-500 uppercase">${q.level} | ${q.type}</p>
                        <p class="text-xs font-bold text-slate-700 truncate">${q.text}</p>
                    </div>
                    <button onclick="removeQ(${q.id})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function removeQ(id) {
            questions = questions.filter(q => q.id !== id);
            localStorage.setItem('h_supreme_q', JSON.stringify(questions));
            updatePortal();
        }

        function renderResults() {
            document.getElementById('results-body').innerHTML = results.map(r => `
                <tr class="border-b"><td class="p-4 text-slate-400 font-bold">${r.date}</td><td class="font-bold">${r.name}</td><td class="text-blue-600 font-bold text-xs">${r.group}</td><td class="font-black text-blue-900">${r.score}%</td></tr>
            `).reverse().join('');
        }

        function tab(t) {
            document.getElementById('tab-add').classList.toggle('hidden', t !== 'add');
            document.getElementById('tab-view').classList.toggle('hidden', t !== 'view');
        }

        function clearQ() { if(confirm("Reset everything?")) {localStorage.clear(); location.reload();}}

        function begin() {
            user.name = document.getElementById('s-name').value;
            user.group = document.getElementById('s-group').value;
            if(!user.name || !user.group) return alert("Enter name and level!");
            
            // Filter questions based on student level
            activeQuestions = questions.filter(q => q.level === user.group);
            if(activeQuestions.length === 0) return alert("No questions available for " + user.group);
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            load();
        }

        function load() {
            const q = activeQuestions[cur];
            document.getElementById('h-date-display').innerText = "Level: " + user.group;
            document.getElementById('q-count').innerText = `Question ${cur + 1} of ${activeQuestions.length}`;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('bot-response').classList.add('hidden');
            
            const imgCont = document.getElementById('q-image-container');
            if(q.img) { document.getElementById('q-image').src = q.img; imgCont.classList.remove('hidden'); }
            else { imgCont.classList.add('hidden'); }

            const mcqBox = document.getElementById('mcq-options');
            const textBox = document.getElementById('text-entry');
            if(q.type === 'mcq') {
                mcqBox.classList.remove('hidden'); textBox.classList.add('hidden');
                mcqBox.innerHTML = '';
                q.options.forEach((opt, idx) => {
                    if(!opt) return;
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full p-5 rounded-2xl font-bold text-left shadow-sm bg-white';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                        if(idx === q.correctIdx) { btn.classList.add('correct'); score++; }
                        else { btn.classList.add('wrong'); document.querySelectorAll('.option-btn')[q.correctIdx].classList.add('correct'); }
                        showBot(q.bot);
                    };
                    mcqBox.appendChild(btn);
                });
            } else {
                mcqBox.classList.add('hidden'); textBox.classList.remove('hidden');
                document.getElementById('text-answer').value = '';
                document.getElementById('text-answer').disabled = false;
            }
        }

        function checkTextAns() {
            const q = activeQuestions[cur];
            const inp = document.getElementById('text-answer');
            const val = inp.value.trim().toLowerCase();
            inp.disabled = true;
            if(val === q.correctAns) { inp.classList.add('correct'); score++; }
            else { inp.classList.add('wrong'); }
            showBot(q.bot + " (Ans: " + q.correctAns + ")");
        }

        function showBot(msg) {
            document.getElementById('bot-msg').innerText = msg || "Keep going!";
            document.getElementById('bot-response').classList.remove('hidden');
            document.getElementById('score-ring').innerText = Math.round((score/activeQuestions.length)*100) + "%";
        }

        function next() {
            cur++;
            if(cur < activeQuestions.length) load();
            else finish();
        }

        function finish() {
            const final = Math.round((score/activeQuestions.length)*100);
            results.push({ date: new Date().toLocaleDateString(), name: user.name, group: user.group, score: final });
            localStorage.setItem('h_supreme_r', JSON.stringify(results));
            document.getElementById('quiz-screen').innerHTML = `<div class="text-center p-12 glass-card rounded-[3rem] shadow-2xl">
                <h2 class="text-4xl font-black text-blue-900 mb-2">Done!</h2>
                <div class="bg-blue-600 text-white py-10 px-16 rounded-[2.5rem] inline-block my-8">
                    <p class="text-8xl font-black">${final}%</p>
                </div>
                <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl">Close</button>
            </div>`;
        }
    </script>
</body>
</html>
